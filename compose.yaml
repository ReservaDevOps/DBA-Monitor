services:
  vpn-client-a:
    build:
      context: .
      dockerfile: docker/vpn/Dockerfile
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "18081:8080"
    volumes:
      - ./environment/vpn/client-a:/vpn:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ip link show tun0 >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 12

  agent-client-a:
    build:
      context: .
      dockerfile: docker/agent/Dockerfile
    network_mode: "service:vpn-client-a"
    depends_on:
      vpn-client-a:
        condition: service_healthy
    env_file:
      - ./environment/db/client-a.env
    volumes:
      - ./data/client-a:/data
      - ./reports:/reports
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      STATUS_INTERVAL_SECONDS: 300
      DAILY_REPORT_HOUR: 2
      DAILY_REPORT_MINUTE: 0
      RUN_STATUS_ON_STARTUP: "true"
      REPORT_NAME: client-a
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
